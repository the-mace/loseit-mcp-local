# Run unit tests on every push/PR. Dependabot auto-merge listens for this
# workflow's success (see dependabot-auto-merge.yml) and only merges after
# green CI — tests are not duplicated there.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v
